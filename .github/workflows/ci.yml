name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: dotnet build --configuration Release
      - name: Test
        run: dotnet test --configuration Release --no-build --filter "Category!=Aspiration"
      - name: Aspiration scoreboard (non-blocking — red here is a to-do, not a break)
        continue-on-error: true
        run: dotnet test --configuration Release --no-build --filter "Category=Aspiration"
